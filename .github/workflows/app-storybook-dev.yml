name: Deploy Application Storybook (dev)

on:
  push:
    branches:
      - dev
    paths:
      - 'apps/storybook/**'
      - 'packages/webkit/**'

permissions: {}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Azion CLI
        run: |
          curl -o azionlinux https://downloads.azion.com/linux/x86_64/azion
          sudo mv azionlinux /usr/bin/azion
          sudo chmod u+x /usr/bin/azion

      - name: CLI version
        run: azion --version

      - name: Configure token
        run: |
          azion -t ${{ secrets.AZION_PERSONAL_TOKEN }}
          azion whoami

      - name: Building Storybook
        working-directory: apps/storybook
        run: |
          pnpm --filter @aziontech/icons build
          pnpm build

      - name: Azion Build
        working-directory: apps/storybook
        run: |
          azion build --debug

      - name: Azion Deploy
        working-directory: apps/storybook
        run: |
          azion deploy --local --debug
