name: Deploy Application Storybook

on:
  push:
    branches:
      - main
    paths:
      - 'apps/storybook/**'

permissions: {}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Azion CLI
        run: |
          curl -o azionlinux https://downloads.azion.com/linux/x86_64/azion
          sudo mv azionlinux /usr/bin/azion
          sudo chmod u+x /usr/bin/azion

      - name: CLI version
        run: azion --version

      - name: Configure token
        run: |
          azion -t ${{ secrets.AZION_PERSONAL_TOKEN }}
          azion whoami

      - name: Building Storybook
        working-directory: apps/storybook
        run: |
          pnpm --filter @aziontech/icons build
          pnpm build

      - name: Azion Build
        working-directory: apps/storybook
        run: |
          azion build --debug

      - name: Azion Deploy
        working-directory: apps/storybook
        run: |
          azion deploy --local --debug
