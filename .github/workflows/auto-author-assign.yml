name: Auto Author Assign
on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-author:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Author Assign
        uses: technote-space/assign-author@9558557c5c4816f38bd06176fbc324ba14bb3160 # v1
