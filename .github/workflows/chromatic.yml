name: Chromatic

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      webkit: ${{ steps.filter.outputs.webkit }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            webkit:
              - 'packages/webkit/**'
              - 'packages/theme/**'
              - 'packages/icons/**'
              - 'apps/storybook/**'

  chromatic:
    name: Visual Regression
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required so Chromatic TurboSnap can diff against the baseline.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build icons (storybook dep)
        run: pnpm --filter icons run build

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          buildScriptName: build
          onlyChanged: true
          exitOnceUploaded: true
