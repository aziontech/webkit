name: Governance Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      webkit: ${{ steps.filter.outputs.webkit }}
      toolkit: ${{ steps.filter.outputs.toolkit }}
      tests: ${{ steps.filter.outputs.tests }}
      visual: ${{ steps.filter.outputs.visual }}
      canary: ${{ steps.filter.outputs.canary }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            webkit:
              - 'packages/webkit/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            toolkit:
              - '.specs/**'
              - '.claude/hooks/**'
              - '.claude/rules/**'
              - 'apps/storybook/**'
              - 'packages/webkit/**'
            tests:
              - 'packages/webkit/**'
              - 'apps/storybook/**'
            visual:
              - 'packages/webkit/**'
              - 'packages/theme/**'
              - 'packages/icons/**'
              - 'apps/storybook/**'
            canary:
              - 'packages/webkit/**'
              - 'lint-canaries/**'
              - 'eslint.config.js'
              - 'commitlint.config.js'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.stylelintrc.json'
              - '.prettierrc.json'
              - '.prettierignore'
              - '.github/workflows/governance.yml'

  security:
    name: Security Scans
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit
        working-directory: packages/webkit

      - name: Run TruffleHog (secret detection)
        uses: trufflesecurity/trufflehog@38999f88bed87fce0861ac313cbca06267b439c7 # main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Check unused dependencies
        run: npx depcheck --ignores="@types/*,eslint-*,semantic-release"
        working-directory: packages/webkit
        continue-on-error: true

  lint-canary:
    name: Lint Canary (broken samples must stay broken)
    needs: changes
    if: needs.changes.outputs.canary == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint canaries (every fixture must still fail its rule)
        run: node lint-canaries/index.js

  lint:
    name: Linting & Formatting
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint (zero warnings policy)
        run: pnpm eslint packages/webkit/src --ext .js,.ts,.vue --max-warnings 0

      - name: Run Stylelint
        run: pnpm stylelint "packages/webkit/**/*.{css,scss,vue}"

      - name: Prettier check (fail on diff)
        run: pnpm prettier --check "packages/webkit/**/*.{js,ts,vue,css,json,md}"

  types:
    name: TypeScript & Type Coverage
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm type-check
        working-directory: packages/webkit

      - name: Type coverage (enforce 95% threshold)
        run: npx type-coverage -p . --at-least 95 --detail
        working-directory: packages/webkit

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [changes, lint, types]
    if: needs.changes.outputs.webkit == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert no test files leak into the tarball
        run: pnpm pack:check
        working-directory: packages/webkit

      - name: Bundle budget (size gate)
        run: pnpm run size
        working-directory: packages/webkit

  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    needs: [changes, lint, types]
    if: needs.changes.outputs.webkit == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Verify Storybook output
        run: test -d apps/storybook/dist && echo "Storybook built successfully"

  toolkit:
    name: Adoption Toolkit (tests + catalog drift)
    needs: changes
    if: needs.changes.outputs.toolkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Catalog is in sync (no drift from exports/specs)
        run: pnpm --filter @aziontech/webkit catalog:check

      - name: Toolkit unit tests (ESLint rules, MCP, CLI, stylelint config)
        run: pnpm --filter @aziontech/webkit test:toolkit

      - name: Construction-standard ratchet (no new authoring violations)
        run: pnpm --filter @aziontech/webkit run authoring

      - name: Every component has its test (testing.md)
        run: pnpm --filter @aziontech/webkit run test:gate

      - name: Skill/agent doc standards ratchet (no new out-of-standard docs)
        run: pnpm --filter @aziontech/webkit run doc-standards

  smoke:
    name: Consumer smoke test (init + build)
    needs: changes
    if: needs.changes.outputs.visual == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Init + build a bare consumer app
        run: pnpm --filter @aziontech/webkit run smoke:consume

  tests:
    name: Vitest browser (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: [changes, lint, types]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.changes.outputs.tests == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/webkit

      - name: Run tests (shard ${{ matrix.shard }})
        run: pnpm exec vitest run --shard=${{ matrix.shard }}/4
        working-directory: packages/webkit

  visual:
    name: Storybook visual tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: [changes, security, lint-canary, lint, types, build, storybook, tests]
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.changes.outputs.visual == 'true' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/storybook

      - name: Build Storybook
        run: pnpm run storybook:build

      - name: Run visual tests (shard ${{ matrix.shard }}/4)
        run: pnpm --filter storybook run test:visual:ci
        env:
          VISUAL_SHARD: ${{ matrix.shard }}/4

      - name: Upload diff output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diff-output-shard-${{ matrix.shard }}
          path: apps/storybook/.storybook/test-visual/__diff_output__/
          retention-days: 7
          if-no-files-found: ignore

  governance-check:
    name: Governance Gate
    runs-on: ubuntu-latest
    needs: [changes, security, lint-canary, lint, types, build, storybook, toolkit, smoke, tests, visual]
    if: always()
    steps:
      - name: Check all jobs passed or skipped
        run: |
          declare -A results=(
            [changes]="${{ needs.changes.result }}"
            [security]="${{ needs.security.result }}"
            [lint-canary]="${{ needs.lint-canary.result }}"
            [lint]="${{ needs.lint.result }}"
            [types]="${{ needs.types.result }}"
            [build]="${{ needs.build.result }}"
            [storybook]="${{ needs.storybook.result }}"
            [toolkit]="${{ needs.toolkit.result }}"
            [smoke]="${{ needs.smoke.result }}"
            [tests]="${{ needs.tests.result }}"
            [visual]="${{ needs.visual.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ $job: $result"
              failed=1
            else
              echo "✅ $job: $result"
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo "Governance checks failed"
            exit 1
          fi
          echo "All governance checks passed or were cleanly skipped"
