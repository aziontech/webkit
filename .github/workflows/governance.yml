name: Governance Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect whether webkit sources changed. Required checks below stay
  # registered on every PR; jobs short-circuit when nothing relevant moved.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      webkit: ${{ steps.filter.outputs.webkit }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            webkit:
              - 'packages/webkit/**'

  # Security Scanning (parallel, fast)
  security:
    name: Security Scans
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        working-directory: packages/webkit

      - name: Run TruffleHog (secret detection)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Check unused dependencies
        run: npx depcheck --ignores="@types/*,eslint-*,semantic-release"
        working-directory: packages/webkit
        continue-on-error: true

  # Linting & Formatting (parallel)
  lint:
    name: Linting & Formatting
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint (zero warnings policy)
        run: pnpm eslint packages/webkit/src --ext .js,.ts,.vue --max-warnings 0

      - name: Run Stylelint
        run: pnpm stylelint "packages/webkit/**/*.{css,scss,vue}"

      - name: Prettier check (fail on diff)
        run: pnpm prettier --check "packages/webkit/**/*.{js,ts,vue,css,json,md}"

  # Type Safety & Coverage (parallel)
  types:
    name: TypeScript & Type Coverage
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm type-check
        working-directory: packages/webkit

      - name: Type coverage (enforce 95% threshold)
        run: npx type-coverage -p . --at-least 95 --detail
        working-directory: packages/webkit

  # Build Verification (needs lint + types)
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [changes, lint, types]
    if: needs.changes.outputs.webkit == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack dry run
        run: pnpm pack:dry
        working-directory: packages/webkit

      - name: Assert no test files leak into the tarball
        run: pnpm pack:check
        working-directory: packages/webkit

  # Storybook Smoke Test
  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    needs: [changes, lint, types]
    if: needs.changes.outputs.webkit == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Verify Storybook output
        run: test -d apps/storybook/dist && echo "Storybook built successfully"

  # Summary Gate — passes when every upstream job is success or cleanly skipped.
  governance-check:
    name: Governance Gate
    runs-on: ubuntu-latest
    needs: [changes, security, lint, types, build, storybook]
    if: always()
    steps:
      - name: Check all jobs passed or skipped
        run: |
          declare -A results=(
            [security]="${{ needs.security.result }}"
            [lint]="${{ needs.lint.result }}"
            [types]="${{ needs.types.result }}"
            [build]="${{ needs.build.result }}"
            [storybook]="${{ needs.storybook.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ $job: $result"
              failed=1
            else
              echo "✅ $job: $result"
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo "Governance checks failed"
            exit 1
          fi
          echo "All governance checks passed or were cleanly skipped"
