name: Tests @aziontech/webkit

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      webkit: ${{ steps.filter.outputs.webkit }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            webkit:
              - 'packages/webkit/**'
              - 'apps/storybook/**'

  # Vitest browser mode (real Chromium). Sharded by 4 so the ~150-component
  # suite parallelises; retry:2 absorbs the rare browser-launch flake.
  test:
    name: Vitest browser (shard ${{ matrix.shard }}/4)
    needs: changes
    if: needs.changes.outputs.webkit == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/webkit

      - name: Run tests (shard ${{ matrix.shard }})
        run: pnpm exec vitest run --shard=${{ matrix.shard }}/4
        working-directory: packages/webkit

  test-check:
    name: Tests Gate
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check test result
        run: |
          result="${{ needs.test.result }}"
          if [[ "$result" != "success" && "$result" != "skipped" ]]; then
            echo "❌ tests: $result"
            exit 1
          fi
          echo "✅ tests: $result"
